
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a472a;
  --green-mid: #2d6a4f;
  --green-light: #52b788;
  --yellow: #f4d03f;
  --yellow-dark: #d4ac0d;

  --bg2: #162b1c;

  --surface2: #243f2c;

  --text2: #a5c9aa;

  --border: rgba(82,183,136,0.15);
  --border2: rgba(82,183,136,0.3);
  --win: #52b788;
  --loss: #e76f51;
  --draw: #f4d03f;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(82,183,136,0.02) 40px,rgba(82,183,136,0.02) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(82,183,136,0.02) 40px,rgba(82,183,136,0.02) 41px);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 16px 80px}
.header{padding:24px 0 16px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--yellow);line-height:1}
.logo span{color:var(--green-light);font-size:14px;display:block;letter-spacing:4px;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:600;letter-spacing:.5px}
.pill-admin{background:var(--yellow);color:#1a1a00}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.btn:hover{background:var(--surface);color:var(--text);border-color:var(--green-light)}
.btn-yellow{background:var(--yellow);color:#1a1a00;border-color:var(--yellow);font-weight:600}
.btn-yellow:hover{background:var(--yellow-dark);border-color:var(--yellow-dark);color:#1a1a00}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{border-color:rgba(231,111,81,0.4);color:#e76f51}
.btn-danger:hover{background:rgba(231,111,81,0.1)}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--radius);padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:'DM Sans',sans-serif;text-align:center}

.tab.active{background:var(--green-mid);color:#fff;font-weight:600}
.section{display:none;animation:fadeIn .2s ease}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.card-accent{border-left:3px solid var(--green-light)}

.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}

.avatar{width:44px;height:44px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;margin:0 auto 8px;letter-spacing:1px;border:2px solid var(--border2)}

.player-card-name{font-size:13px;font-weight:500;color:var(--text)}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}

.stat-l{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.stat-win .stat-n{color:var(--win)}
.stat-loss .stat-n{color:var(--loss)}

.badge-l{background:rgba(231,111,81,0.15);color:var(--loss);border:1px solid rgba(231,111,81,0.3)}

.tabla{width:100%;border-collapse:collapse;font-size:12px}
.tabla th{padding:8px 6px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border)}

.pos-3{color:#cd7f32}
.pname{font-weight:600;color:var(--text);font-size:13px}
.rec-w{color:var(--win)}
.rec-e{color:var(--draw)}

.pct-bar{width:100%;height:4px;background:var(--bg2);border-radius:2px;margin-top:3px}
.pct-fill{height:4px;background:var(--green-light);border-radius:2px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.match-info{flex:1}
.match-date-tag{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.match-score-big{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:2px;color:var(--text)}
.match-teams-txt{font-size:12px;color:var(--text2)}
.team-bold{font-weight:700;color:var(--text)}
.location-tag{font-size:10px;color:var(--text3);margin-top:3px}
.form-group{margin-bottom:14px}
.form-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:500;display:block;margin-bottom:6px}
.form-group select,.form-group input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.form-group select:focus,.form-group input:focus{border-color:var(--green-light)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--yellow);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:20px 0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.chip-x{cursor:pointer;color:var(--text3);font-size:10px;line-height:1;padding:1px 2px}
.chip-x:hover{color:var(--loss)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px;color:var(--yellow)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;border:1px solid}
.alert-ok{background:rgba(82,183,136,0.1);color:var(--win);border-color:rgba(82,183,136,0.3)}
.alert-err{background:rgba(231,111,81,0.1);color:var(--loss);border-color:rgba(231,111,81,0.3)}
.alert-info{background:rgba(244,208,63,0.1);color:var(--draw);border-color:rgba(244,208,63,0.2)}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green-light);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.h2h-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.h2h-row:last-child{border-bottom:none}
.h2h-name{font-size:13px;font-weight:500;flex:1}
.h2h-record{font-size:12px;display:flex;gap:6px;align-items:center}
.mvp-card{display:flex;align-items:center;gap:14px}
.mvp-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.mvp-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mvp-sub{font-size:12px;color:var(--text3);margin-top:2px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--green-mid);border-radius:2px}
@media(max-width:480px){
  .logo{font-size:22px}
  .tabs{gap:1px}
  .tab{font-size:10px;padding:8px 2px}
  .form-row{grid-template-columns:1fr}
}
</style>

<body>
<div class="app">
  <div class="header">
    <div class="logo">Liga Grumetil<span>🎾 Pádel Club</span></div>
    <div class="header-right">
      <span id="admin-label" class="pill pill-admin" style="display:none">ADMIN</span>
      <button class="btn" id="login-btn" onclick="showLoginModal()">Admin</button>
      <button class="btn btn-danger btn-sm" id="logout-btn" style="display:none" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">Inicio</button>
    <button class="tab" onclick="showTab('individual',this)">Individual</button>
    <button class="tab" onclick="showTab('parejas',this)">Parejas</button>
    <button class="tab" onclick="showTab('historial',this)">Historial</button>
    <button class="tab" id="admin-tab" style="display:none" onclick="showTab('admin',this)">+ Admin</button>
  </div>

  <div id="sec-home" class="section active"><div id="home-content"></div></div>
  <div id="sec-individual" class="section"><div id="individual-content"></div></div>
  <div id="sec-parejas" class="section"><div id="parejas-content"></div></div>
  <div id="sec-historial" class="section"><div id="historial-content"></div></div>
  <div id="sec-admin" class="section"><div id="admin-content"></div></div>
</div>

<!-- MODAL LOGIN -->
<div class="modal-bg" id="modal-login">
  <div class="modal">
    <div class="modal-title">Acceso Admin</div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div id="login-err" style="display:none" class="alert alert-err">Contraseña incorrecta.</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeModal('modal-login')">Cancelar</button>
      <button class="btn btn-yellow" onclick="tryLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- MODAL PERFIL JUGADOR -->
<div class="modal-bg" id="modal-perfil">
  <div class="modal">
    <div id="modal-perfil-content"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn" onclick="closeModal('modal-perfil')">Cerrar</button>
    </div>
  </div>
</div>

<script>
const BIN_ID = "69dbcfc7856a68218927541a";
const API_KEY = "$2a$10$iTTODe3UklLvnQpRfaWDFeR4/Fp3NQb/oM0MSxHImKBYPKDzN.3CC";
const JSONBIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
const ADMIN_PASS = "Grumete";
const LOCATIONS = ["La Hípica","Alberto Maestro","Soccer Ranillas","Expo","Aragonia"];
const DEFAULT_PLAYERS = ["Alejandro Bueno","Lucas Badiola","Alfonso Tremul","Pablo Mateo","Daniel Gallego","Bosco Garrido","Yago Montero","Alex Lopez","Jorge Alarcón","Pablo Ortega","Pablo Cuervo"];

let state = { players:[...DEFAULT_PLAYERS], matches:[], isAdmin:false, currentUser:null };

async function loadFromCloud() {
  try {
    const r = await fetch(JSONBIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY}});
    const d = await r.json();
    if(d.record){ state.players=d.record.players||DEFAULT_PLAYERS; state.matches=d.record.matches||[]; }
  } catch(e){ console.warn(e); }
}

async function saveToCloud() {
  try {
    await fetch(JSONBIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({players:state.players,matches:state.matches})});
  } catch(e){ console.warn(e); }
}

function normPair(a,b){ return [a,b].sort().join('|||'); }

function calcStats(){
  const ps={};
  state.players.forEach(p=>{ ps[p]={w:0,l:0,d:0,gw:0,gl:0,lastMatch:null,streak:[]}; });
  const pairs={};

  state.matches.forEach(m=>{
    const {t1p1,t1p2,t2p1,t2p2,s1,s2,date,score,location} = m;
    const teams=[[t1p1,t1p2],[t2p1,t2p2]];
    const res=[s1>s2?'w':s1<s2?'l':'d', s1>s2?'l':s1<s2?'w':'d'];

    // Calcular games reales desde el marcador exacto
    let gamesT1=0, gamesT2=0;
    if(score){
      score.split('/').forEach(set=>{
        const parts=set.trim().split('-');
        if(parts.length===2){
          gamesT1+=parseInt(parts[0])||0;
          gamesT2+=parseInt(parts[1])||0;
        }
      });
    }

    teams.forEach((team,ti)=>{
      const r=res[ti];
      team.forEach(p=>{
        if(!ps[p]) ps[p]={w:0,l:0,d:0,gw:0,gl:0,lastMatch:null,streak:[]};
        ps[p][r]++;
        ps[p].streak.push(r);
        // juegos ganados/perdidos desde marcador exacto
        ps[p].gw += ti===0?gamesT1:gamesT2;
        ps[p].gl += ti===0?gamesT2:gamesT1;
        const opp=ti===0?[t2p1,t2p2]:[t1p1,t1p2];
        const partner=team.find(x=>x!==p);
        if(!ps[p].lastMatch||date>ps[p].lastMatch.date){
          ps[p].lastMatch={date,partner,opp1:opp[0],opp2:opp[1],score:score||(s1+'-'+s2),res:r,location:location||''};
        }
      });
      const key=normPair(team[0],team[1]);
      if(!pairs[key]) pairs[key]={p1:team[0],p2:team[1],w:0,l:0,d:0};
      pairs[key][r]++;
    });
  });
  return{ps,pairs};
}

function currentStreak(streak){
  if(!streak.length) return{type:'',len:0};
  const last=streak[streak.length-1];
  let len=0;
  for(let i=streak.length-1;i>=0;i--){ if(streak[i]===last) len++; else break; }
  return{type:last,len};
}

function winPct(w,total){ return total?Math.round(w/total*100):0; }

// Orden estilo NBA:
// 1. No puedes ir por delante de quien ha jugado más partidos que tú
// 2. Mismos partidos: mayor % de victorias
// 3. Mismas victorias: mayor % de games ganados (gw/(gw+gl))
function gamePct(gw,gl){ const t=gw+gl; return t?gw/t:0; }
function rankPlayers(ps){
  return Object.entries(ps)
    .map(([name,s])=>({name,...s,total:s.w+s.l+s.d}))
    .sort((a,b)=>{
      if(a.total < b.total) return 1;
      if(b.total < a.total) return -1;
      const pa=winPct(a.w,a.total), pb=winPct(b.w,b.total);
      if(pb!==pa) return pb-pa;
      return gamePct(b.gw,b.gl)-gamePct(a.gw,a.gl);
    });
}

function rankPairs(pairs){
  return Object.values(pairs)
    .map(p=>({...p,total:p.w+p.l+p.d}))
    .sort((a,b)=>{
      if(a.total < b.total) return 1;
      if(b.total < a.total) return -1;
      const pa=winPct(a.w,a.total), pb=winPct(b.w,b.total);
      if(pb!==pa) return pb-pa;
      return (b.w-b.l)-(a.w-a.l);
    });
}

// MVP y PEOR del mes (últimos 30 días)
function calcMonthStats(){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  const cutStr=cutoff.toISOString().split('T')[0];
  const recent=state.matches.filter(m=>m.date>=cutStr);
  const ms={};
  state.players.forEach(p=>{ ms[p]={w:0,l:0,total:0}; });
  recent.forEach(m=>{
    const {t1p1,t1p2,t2p1,t2p2,s1,s2}=m;
    const teams=[[t1p1,t1p2],[t2p1,t2p2]];
    const res=[s1>s2?'w':s1<s2?'l':'d',s1>s2?'l':s1<s2?'w':'d'];
    teams.forEach((team,ti)=>{
      team.forEach(p=>{
        if(!ms[p]) ms[p]={w:0,l:0,total:0};
        ms[p][res[ti]]++;
        ms[p].total++;
      });
    });
  });
  const active=Object.entries(ms).filter(([,v])=>v.total>0);
  if(!active.length) return{mvp:null,worst:null};
  active.sort((a,b)=>b[1].w-a[1].w||b[1].total-a[1].total);
  const mvp={name:active[0][0],...active[0][1]};
  active.sort((a,b)=>a[1].w-b[1].w||b[1].total-a[1].total);
  const worst={name:active[0][0],...active[0][1]};
  return{mvp,worst};
}

function showTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('sec-'+tab).classList.add('active');
  renderSection(tab);
}

function renderSection(tab){
  if(tab==='home') renderHome();
  else if(tab==='individual') renderIndividual();
  else if(tab==='parejas') renderParejas();
  else if(tab==='historial') renderHistorial();
  else if(tab==='admin') renderAdmin();
}

// ── HOME ────────────────────────────────────────────────
function renderHome(){
  const el=document.getElementById('home-content');
  if(!state.currentUser){
    el.innerHTML=`
      <div class="alert alert-info" style="margin-bottom:16px">Elige tu nombre para ver tus estadísticas personales.</div>
      <div class="player-grid">${state.players.map(p=>`
        <div class="player-card" onclick="selectUser('${esc(p)}')">
          <div class="avatar">${initials(p)}</div>
          <div class="player-card-name">${p}</div>
        </div>`).join('')}
      </div>`;
    return;
  }
  const {ps}=calcStats();
  const s=ps[state.currentUser]||{w:0,l:0,d:0,gw:0,gl:0,lastMatch:null,streak:[]};
  const st=currentStreak(s.streak);
  const streakHtml=st.len
    ?`<span class="streak-pill ${st.type==='w'?'streak-w':st.type==='l'?'streak-l':'streak-n'}">${st.len} ${st.type==='w'?'victorias':st.type==='l'?'derrotas':'empates'} seguidas</span>`
    :`<span class="streak-pill streak-n">Sin racha aún</span>`;
  const lastHtml=s.lastMatch?`
    <div class="last-match">
      <div class="lm-date">${formatDate(s.lastMatch.date)}${s.lastMatch.location?' · '+s.lastMatch.location:''}</div>
      <div class="lm-teams">${state.currentUser} &amp; ${s.lastMatch.partner} <span style="color:var(--text3)">vs</span> ${s.lastMatch.opp1} &amp; ${s.lastMatch.opp2}</div>
      <div class="lm-score">${s.lastMatch.score} <span class="badge ${s.lastMatch.res==='w'?'badge-w':s.lastMatch.res==='l'?'badge-l':'badge-d'}">${s.lastMatch.res==='w'?'VICTORIA':s.lastMatch.res==='l'?'DERROTA':'EMPATE'}</span></div>
    </div>`:`<div style="margin-top:12px;font-size:13px;color:var(--text3)">Sin partidos jugados aún.</div>`;

  // MVP del mes
  const {mvp,worst}=calcMonthStats();
  const mvpHtml=mvp?`
    <div class="card card-yellow" style="margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="mvp-card">
          <div class="avatar-md" style="background:#2d4a1e;border:2px solid var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--yellow);flex-shrink:0">${initials(mvp.name)}</div>
          <div>
            <div class="mvp-label" style="color:var(--yellow)">⭐ MVP del mes</div>
            <div class="mvp-name" style="color:var(--yellow)">${mvp.name.split(' ')[0]}</div>
            <div class="mvp-sub">${mvp.w}V · ${mvp.total} partidos</div>
          </div>
        </div>
        ${worst&&worst.name!==mvp.name?`
        <div class="mvp-card">
          <div class="avatar-md" style="background:#2a1a18;border:2px solid var(--loss);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--loss);flex-shrink:0">${initials(worst.name)}</div>
          <div>
            <div class="mvp-label" style="color:var(--loss)">📉 Peor del mes</div>
            <div class="mvp-name" style="color:var(--loss)">${worst.name.split(' ')[0]}</div>
            <div class="mvp-sub">${worst.w}V · ${worst.total} partidos</div>
          </div>
        </div>`:''}
      </div>
    </div>`:'';

  el.innerHTML=`
    ${mvpHtml}
    <div class="card card-accent">
      <div class="profile-header">
        <div class="avatar avatar-lg">${initials(state.currentUser)}</div>
        <div style="flex:1">
          <div class="profile-name">${state.currentUser}<small>Jugador activo</small></div>
          ${streakHtml}
        </div>
        <button class="btn btn-sm" onclick="selectUser(null)">Cambiar</button>
      </div>
      ${lastHtml}
    </div>
    <div class="stats-row">
      <div class="stat stat-win"><div class="stat-n">${s.w}</div><div class="stat-l">Victorias</div></div>
      <div class="stat stat-loss"><div class="stat-n">${s.l}</div><div class="stat-l">Derrotas</div></div>
      <div class="stat stat-draw"><div class="stat-n">${s.d}</div><div class="stat-l">Empates</div></div>
    </div>
    <button class="btn" style="width:100%;margin-top:4px" onclick="showPerfilModal('${esc(state.currentUser)}')">Ver historial de partidos →</button>`;
}

// ── HISTORIAL ───────────────────────────────────────────
function renderHistorial(){
  const el=document.getElementById('historial-content');
  if(!state.matches.length){el.innerHTML=emptyState('No hay partidos registrados todavía.');return;}
  const sorted=[...state.matches].map((m,i)=>({...m,_idx:i})).sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML=sorted.map(m=>{
    const w=parseInt(m.s1)>parseInt(m.s2)?1:parseInt(m.s1)<parseInt(m.s2)?2:0;
    const displayScore=m.score||(m.s1+'-'+m.s2);
    return`<div class="match-card">
      <div class="match-info">
        <div class="match-date-tag">${formatDate(m.date)}${m.location?' · '+m.location:''}</div>
        <div class="match-score-big">${displayScore} ${w===0?'<span class="badge badge-d">EMPATE</span>':''}</div>
        <div class="match-teams-txt">
          <span class="${w===1?'team-bold':''}">${m.t1p1} &amp; ${m.t1p2}</span>
          <span style="color:var(--text3)"> vs </span>
          <span class="${w===2?'team-bold':''}">${m.t2p1} &amp; ${m.t2p2}</span>
        </div>
      </div>
      ${state.isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteMatch(${m._idx})">Eliminar</button>`:''}
    </div>`;
  }).join('');
}

    <div class="section-title">Añadir Partido</div>

    <div class="card">
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group" style="margin:0"><label>Equipo 1 · Jugador A</label><select id="t1p1">${opts}</select></div>
        <div class="form-group" style="margin:0"><label>Equipo 1 · Jugador B</label><select id="t1p2">${opts}</select></div>

        <div class="form-group" style="margin:0"><label>Equipo 2 · Jugador B</label><select id="t2p2">${opts}</select></div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group" style="margin:0"><label>Sets ganados Equipo 1</label><input type="number" id="s1" min="0" max="9" value="2"></div>
        <div class="form-group" style="margin:0"><label>Sets ganados Equipo 2</label><input type="number" id="s2" min="0" max="9" value="1"></div>
      </div>
      <div class="form-group"><label>Marcador exacto (ej: 6-3 / 6-2)</label><input type="text" id="score-str" placeholder="6-3 / 6-2"></div>
      <div class="form-row" style="margin-bottom:12px">

        <div class="form-group" style="margin:0"><label>Fecha</label><input type="date" id="mdate" value="${todayStr()}"></div>

    </div>
    <div class="divider"></div>
    <div class="section-title">Jugadores</div>
    <div class="card">
      <div class="chips">${state.players.map(p=>`
        <span class="chip">${p}<span class="chip-x" onclick="removePlayer('${esc(p)}')">✕</span></span>`).join('')}
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><input type="text" id="new-player" placeholder="Nombre completo" style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;width:100%;outline:none"></div>
        <button class="btn btn-yellow" onclick="addPlayer()">Añadir</button>
      </div>

  const selects=['t1p1','t1p2','t2p1','t2p2'];
  selects.forEach((id,i)=>{ const e=document.getElementById(id); if(e&&state.players[i]) e.value=state.players[i]; });
}

// ── PERFIL MODAL (historial head to head) ───────────────
function showPerfilModal(playerName){
  const {ps}=calcStats();
  const s=ps[playerName]||{w:0,l:0,d:0,gw:0,gl:0};
  const total=s.w+s.l+s.d;

  // Partidos jugados por este jugador
  const myMatches=state.matches
    .filter(m=>[m.t1p1,m.t1p2,m.t2p1,m.t2p2].includes(playerName))
    .sort((a,b)=>b.date.localeCompare(a.date));

  // Head to head contra cada rival
  const h2h={};
  myMatches.forEach(m=>{
    const inT1=[m.t1p1,m.t1p2].includes(playerName);
    const myTeam=inT1?[m.t1p1,m.t1p2]:[m.t2p1,m.t2p2];
    const oppTeam=inT1?[m.t2p1,m.t2p2]:[m.t1p1,m.t1p2];
    const res=inT1?(m.s1>m.s2?'w':m.s1<m.s2?'l':'d'):(m.s2>m.s1?'w':m.s2<m.s1?'l':'d');
    oppTeam.forEach(opp=>{
      if(!h2h[opp]) h2h[opp]={w:0,l:0,d:0};
      h2h[opp][res]++;
    });
  });

  const h2hRows=Object.entries(h2h).sort((a,b)=>(b[1].w+b[1].l+b[1].d)-(a[1].w+a[1].l+a[1].d)).map(([opp,r])=>`
    <div class="h2h-row">
      <div class="h2h-name">${opp}</div>
      <div class="h2h-record">
        <span class="rec-w">${r.w}V</span>
        <span class="rec-e">${r.d}E</span>
        <span class="rec-l">${r.l}D</span>
      </div>
    </div>`).join('');

  // Lista de partidos
  const matchRows=myMatches.map(m=>{
    const inT1=[m.t1p1,m.t1p2].includes(playerName);
    const res=inT1?(m.s1>m.s2?'w':m.s1<m.s2?'l':'d'):(m.s2>m.s1?'w':m.s2<m.s1?'l':'d');
    const myTeam=inT1?`${m.t1p1} &amp; ${m.t1p2}`:`${m.t2p1} &amp; ${m.t2p2}`;
    const oppTeam=inT1?`${m.t2p1} &amp; ${m.t2p2}`:`${m.t1p1} &amp; ${m.t1p2}`;
    const displayScore=m.score||(m.s1+'-'+m.s2);
    return`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
      <div style="color:var(--text3);font-size:10px;margin-bottom:2px">${formatDate(m.date)}${m.location?' · '+m.location:''}</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="color:var(--text2)">${myTeam} <span style="color:var(--text3)">vs</span> ${oppTeam}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px">${displayScore}</span>
          <span class="badge ${res==='w'?'badge-w':res==='l'?'badge-l':'badge-d'}">${res==='w'?'V':res==='l'?'D':'E'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-perfil-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar avatar-md" style="border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;color:#fff;flex-shrink:0">${initials(playerName)}</div>
      <div>
        <div class="modal-title" style="margin-bottom:2px">${playerName}</div>
        <div style="font-size:12px;color:var(--text3)">${total} partidos · <span class="rec-w">${s.w}V</span> <span class="rec-e">${s.d}E</span> <span class="rec-l">${s.l}D</span></div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Cara a cara</div>
    <div style="margin-bottom:16px">${h2hRows||'<div style="color:var(--text3);font-size:12px">Sin datos</div>'}</div>
    <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Partidos jugados</div>
    <div>${matchRows||'<div style="color:var(--text3);font-size:12px">Sin partidos</div>'}</div>`;

  document.getElementById('modal-perfil').classList.add('open');
}

// ── ACTIONS ─────────────────────────────────────────────
async function addMatch(){
  const t1p1=document.getElementById('t1p1').value;
  const t1p2=document.getElementById('t1p2').value;
  const t2p1=document.getElementById('t2p1').value;
  const t2p2=document.getElementById('t2p2').value;
  const s1=parseInt(document.getElementById('s1').value);
  const s2=parseInt(document.getElementById('s2').value);
  const date=document.getElementById('mdate').value;
  const score=document.getElementById('score-str').value.trim();
  const location=document.getElementById('location').value;

  if(new Set([t1p1,t1p2,t2p1,t2p2]).size<4){showAdminAlert('Los cuatro jugadores deben ser distintos.','err');return;}
  if(isNaN(s1)||isNaN(s2)){showAdminAlert('Introduce los sets correctamente.','err');return;}
  state.matches.push({t1p1,t1p2,t2p1,t2p2,s1,s2,date,score,location});
  showAdminAlert('Guardando...','info');
  await saveToCloud();
  showAdminAlert('¡Partido guardado correctamente!','ok');
  renderAdmin();
}

async function deleteMatch(idx){
  if(!confirm('¿Eliminar este partido?')) return;
  state.matches.splice(idx,1);
  await saveToCloud();
  renderHistorial();
}

async function addPlayer(){
  const inp=document.getElementById('new-player');
  const name=inp.value.trim();
  if(!name||state.players.includes(name)) return;
  state.players.push(name);
  await saveToCloud();
  renderAdmin();
  inp.value='';
}

async function removePlayer(name){
  if(!confirm('¿Eliminar a '+name+'?\nSus partidos seguirán en el historial.')) return;
  state.players=state.players.filter(p=>p!==name);
  await saveToCloud();
  renderAdmin();
}

function selectUser(name){ state.currentUser=name; renderHome(); }

function showLoginModal(){
  document.getElementById('login-err').style.display='none';
  document.getElementById('pass-input').value='';
  document.getElementById('modal-login').classList.add('open');
  setTimeout(()=>document.getElementById('pass-input').focus(),100);
}

function tryLogin(){
  if(document.getElementById('pass-input').value===ADMIN_PASS){
    state.isAdmin=true;
    document.getElementById('admin-label').style.display='';
    document.getElementById('admin-tab').style.display='';
    document.getElementById('login-btn').style.display='none';
    document.getElementById('logout-btn').style.display='';
    closeModal('modal-login');
  } else { document.getElementById('login-err').style.display=''; }
}

function doLogout(){
  state.isAdmin=false;
  document.getElementById('admin-label').style.display='none';
  document.getElementById('admin-tab').style.display='none';
  document.getElementById('login-btn').style.display='';
  document.getElementById('logout-btn').style.display='none';
  showTab('home',document.querySelector('.tab'));
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',function(e){ if(e.target===this) closeModal(this.id); }));

function initials(name){ return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function formatDate(str){
  if(!str) return '';
  const [y,m,d]=str.split('-');
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return parseInt(d)+' '+months[parseInt(m)-1]+' '+y;
}
function emptyState(msg){ return '<div class="empty"><div class="empty-icon">🎾</div>'+msg+'</div>'; }
function showAdminAlert(msg,type){
  const el=document.getElementById('admin-alert');
  if(!el) return;
  el.className='alert alert-'+type;
  el.textContent=msg;
  el.style.display='';
}
function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

async function init(){
  document.getElementById('home-content').innerHTML='<div class="loading"><div class="spinner"></div>Cargando datos...</div>';
  await loadFromCloud();
  renderHome();
}
init();
</script>
