
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga de Pádel Grumetil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a472a;
  --green-mid: #2d6a4f;
  --green-light: #52b788;
  --yellow: #f4d03f;
  --yellow-dark: #d4ac0d;
  --bg: #0f1f14;
  --bg2: #162b1c;
  --surface: #1e3826;
  --surface2: #243f2c;
  --text: #e8f5e9;
  --text2: #a5c9aa;
  --text3: #6b9b73;
  --border: rgba(82,183,136,0.15);
  --border2: rgba(82,183,136,0.3);
  --win: #52b788;
  --loss: #e76f51;
  --draw: #f4d03f;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(82,183,136,0.02) 40px,rgba(82,183,136,0.02) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(82,183,136,0.02) 40px,rgba(82,183,136,0.02) 41px);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 16px 80px}
.header{padding:24px 0 16px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--yellow);line-height:1}
.logo span{color:var(--green-light);font-size:14px;display:block;letter-spacing:4px;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:600;letter-spacing:.5px}
.pill-admin{background:var(--yellow);color:#1a1a00}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.btn:hover{background:var(--surface);color:var(--text);border-color:var(--green-light)}
.btn-yellow{background:var(--yellow);color:#1a1a00;border-color:var(--yellow);font-weight:600}
.btn-yellow:hover{background:var(--yellow-dark);border-color:var(--yellow-dark);color:#1a1a00}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{border-color:rgba(231,111,81,0.4);color:#e76f51}
.btn-danger:hover{background:rgba(231,111,81,0.1)}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--radius);padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);transition:all .15s;font-family:'DM Sans',sans-serif;text-align:center}
.tab:hover:not(.active){color:var(--text2);background:rgba(82,183,136,0.05)}
.tab.active{background:var(--green-mid);color:#fff;font-weight:600}
.section{display:none;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.card-accent{border-left:3px solid var(--green-light)}
.card-yellow{border-left:3px solid var(--yellow)}
.card-loss{border-left:3px solid var(--loss)}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.player-card:hover{border-color:var(--green-light);background:var(--surface2);transform:translateY(-2px)}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;margin:0 auto 8px;letter-spacing:1px;border:2px solid var(--border2)}
.avatar-lg{width:60px;height:60px;font-size:20px;margin:0}
.avatar-md{width:48px;height:48px;font-size:17px;margin:0}
.player-card-name{font-size:13px;font-weight:500;color:var(--text)}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--text);line-height:1}
.profile-name small{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text3);font-weight:400;display:block;letter-spacing:0;margin-top:2px}
.streak-pill{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600;margin-top:6px;display:inline-block}
.streak-w{background:rgba(82,183,136,0.2);color:var(--win);border:1px solid rgba(82,183,136,0.3)}
.streak-l{background:rgba(231,111,81,0.15);color:var(--loss);border:1px solid rgba(231,111,81,0.3)}
.streak-n{background:rgba(244,208,63,0.15);color:var(--draw);border:1px solid rgba(244,208,63,0.3)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--border)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.stat-win .stat-n{color:var(--win)}
.stat-loss .stat-n{color:var(--loss)}
.stat-draw .stat-n{color:var(--draw)}
.last-match{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.lm-date{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lm-teams{font-size:13px;color:var(--text2);margin-bottom:4px}
.lm-score{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--text)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:.5px;vertical-align:middle;margin-left:8px}
.badge-w{background:rgba(82,183,136,0.2);color:var(--win);border:1px solid rgba(82,183,136,0.3)}
.badge-l{background:rgba(231,111,81,0.15);color:var(--loss);border:1px solid rgba(231,111,81,0.3)}
.badge-d{background:rgba(244,208,63,0.15);color:var(--draw);border:1px solid rgba(244,208,63,0.2)}
.tabla{width:100%;border-collapse:collapse;font-size:12px}
.tabla th{padding:8px 6px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border)}
.tabla td{padding:10px 6px;border-bottom:1px solid var(--border)}
.tabla tr:last-child td{border-bottom:none}
.tabla tr:hover td{background:rgba(82,183,136,0.03)}
.pos-num{font-family:'Bebas Neue',sans-serif;font-size:18px;text-align:center;color:var(--text3)}
.pos-1{color:var(--yellow)}
.pos-2{color:#c0c0c0}
.pos-3{color:#cd7f32}
.pname{font-weight:600;color:var(--text);font-size:13px}
.rec-w{color:var(--win)}
.rec-e{color:var(--draw)}
.rec-l{color:var(--loss)}
.pct-bar{width:100%;height:4px;background:var(--bg2);border-radius:2px;margin-top:3px}
.pct-fill{height:4px;background:var(--green-light);border-radius:2px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.match-info{flex:1}
.match-date-tag{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.match-score-big{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:2px;color:var(--text)}
.match-teams-txt{font-size:12px;color:var(--text2)}
.team-bold{font-weight:700;color:var(--text)}
.location-tag{font-size:10px;color:var(--text3);margin-top:3px}
.form-group{margin-bottom:14px}
.form-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:500;display:block;margin-bottom:6px}
.form-group select,.form-group input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.form-group select:focus,.form-group input:focus{border-color:var(--green-light)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--yellow);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:20px 0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text2)}
.chip-x{cursor:pointer;color:var(--text3);font-size:10px;line-height:1;padding:1px 2px}
.chip-x:hover{color:var(--loss)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px;color:var(--yellow)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;border:1px solid}
.alert-ok{background:rgba(82,183,136,0.1);color:var(--win);border-color:rgba(82,183,136,0.3)}
.alert-err{background:rgba(231,111,81,0.1);color:var(--loss);border-color:rgba(231,111,81,0.3)}
.alert-info{background:rgba(244,208,63,0.1);color:var(--draw);border-color:rgba(244,208,63,0.2)}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green-light);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.h2h-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.h2h-row:last-child{border-bottom:none}
.h2h-name{font-size:13px;font-weight:500;flex:1}
.h2h-record{font-size:12px;display:flex;gap:6px;align-items:center}
.mvp-card{display:flex;align-items:center;gap:14px}
.mvp-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.mvp-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.mvp-sub{font-size:12px;color:var(--text3);margin-top:2px}

.achievements-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.achievement-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;transition:all .2s}
.achievement-card strong{display:block;font-size:12px;color:var(--text);margin-bottom:4px}
.achievement-card span{display:block;font-size:11px;color:var(--text2);line-height:1.35}
.achievement-card.locked{opacity:.55;filter:grayscale(1) blur(.3px);background:rgba(255,255,255,0.02)}
.achievement-card.unlocked{border-color:rgba(244,208,63,0.45);box-shadow:0 0 0 1px rgba(244,208,63,0.18) inset, 0 0 18px rgba(244,208,63,0.08);background:linear-gradient(180deg,rgba(244,208,63,0.08),rgba(82,183,136,0.04))}
.achievement-status{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.achievement-card.unlocked .achievement-status{background:rgba(244,208,63,0.18);color:var(--yellow);border:1px solid rgba(244,208,63,0.25)}
.achievement-card.locked .achievement-status{background:rgba(165,201,170,0.08);color:var(--text3);border:1px solid var(--border)}
.form-dots{display:flex;gap:5px;align-items:center;min-width:64px}
.form-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,0.12)}
.form-dot.w{background:var(--win)}
.form-dot.d{background:var(--draw)}
.form-dot.l{background:var(--loss)}
.form-dot.n{background:rgba(255,255,255,0.08)}
.achievement-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.achievement-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,0.05);border:1px solid var(--border);flex-shrink:0}
.achievement-copy{min-width:0}
.achievement-card strong{margin-bottom:0}
.achievement-card.unlocked .achievement-icon{background:rgba(244,208,63,0.14);border-color:rgba(244,208,63,0.26);box-shadow:0 0 12px rgba(244,208,63,0.12)}
.achievement-card.new-unlock{animation:achievementPop .9s ease, achievementGlow 1.6s ease}
@keyframes achievementPop{0%{transform:scale(.94)}45%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes achievementGlow{0%{box-shadow:0 0 0 0 rgba(244,208,63,0)}40%{box-shadow:0 0 0 1px rgba(244,208,63,0.25) inset,0 0 26px rgba(244,208,63,0.28)}100%{box-shadow:0 0 0 1px rgba(244,208,63,0.18) inset,0 0 18px rgba(244,208,63,0.08)}}
#achievement-toast-container{position:fixed;right:16px;bottom:18px;z-index:999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.achievement-toast{min-width:240px;max-width:300px;background:linear-gradient(180deg,rgba(36,63,44,0.98),rgba(15,31,20,0.98));border:1px solid rgba(244,208,63,0.35);border-radius:12px;padding:12px 14px;box-shadow:0 14px 28px rgba(0,0,0,0.28);display:flex;align-items:center;gap:10px;color:var(--text);animation:toastIn .35s ease, toastOut .35s ease 2.75s forwards}
.achievement-toast-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(244,208,63,0.14);font-size:18px;flex-shrink:0}
.achievement-toast small{display:block;font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.achievement-toast strong{display:block;font-size:13px;color:var(--text)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--green-mid);border-radius:2px}
@media(max-width:480px){
  .logo{font-size:22px}
  .tabs{gap:1px}
  .tab{font-size:10px;padding:8px 2px}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Liga Grumetil<span>🎾 Pádel Club</span></div>
    <div class="header-right">
      <span id="admin-label" class="pill pill-admin" style="display:none">ADMIN</span>
      <button class="btn" id="login-btn" onclick="showLoginModal()">Admin</button>
      <button class="btn btn-danger btn-sm" id="logout-btn" style="display:none" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">Inicio</button>
    <button class="tab" onclick="showTab('individual',this)">Individual</button>
    <button class="tab" onclick="showTab('parejas',this)">Parejas</button>
    <button class="tab" onclick="showTab('historial',this)">Historial</button>
    <button class="tab" id="admin-tab" style="display:none" onclick="showTab('admin',this)">+ Admin</button>
  </div>

  <div id="sec-home" class="section active"><div id="home-content"></div></div>
  <div id="sec-individual" class="section"><div id="individual-content"></div></div>
  <div id="sec-parejas" class="section"><div id="parejas-content"></div></div>
  <div id="sec-historial" class="section"><div id="historial-content"></div></div>
  <div id="sec-admin" class="section"><div id="admin-content"></div></div>
</div>

<div class="modal-bg" id="modal-login">
  <div class="modal">
    <div class="modal-title">Acceso Admin</div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="pass-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div id="login-err" style="display:none" class="alert alert-err">Contraseña incorrecta.</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeModal('modal-login')">Cancelar</button>
      <button class="btn btn-yellow" onclick="tryLogin()">Entrar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-perfil">
  <div class="modal">
    <div id="modal-perfil-content"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn" onclick="closeModal('modal-perfil')">Cerrar</button>
    </div>
  </div>
</div>

<div id="achievement-toast-container"></div>

<script>
const BIN_ID = "69dbcfc7856a68218927541a";
const API_KEY = "$2a$10$iTTODe3UklLvnQpRfaWDFeR4/Fp3NQb/oM0MSxHImKBYPKDzN.3CC";
const JSONBIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
const ADMIN_PASS = "Grumete";
const LOCATIONS = ["La Hípica","Alberto Maestro","Soccer Ranillas","Expo","Aragonia"];
const DEFAULT_PLAYERS = ["Alejandro Bueno","Lucas Badiola","Alfonso Tremul","Pablo Mateo","Daniel Gallego","Bosco Garrido","Yago Montero","Alex Lopez","Jorge Alarcón","Pablo Ortega","Pablo Cuervo"];

let state = { players:[...DEFAULT_PLAYERS], matches:[], isAdmin:false, currentUser:null };
const ACHIEVEMENT_META = {
  '100': { icon:'💯' },
  '50': { icon:'5️⃣' },
  'conquistador': { icon:'🏟️' },
  'vayadia': { icon:'😵' },
  'apisonadora': { icon:'🚜' },
  'destructor': { icon:'💣' },
  'rey': { icon:'👑' },
  'bienvenido': { icon:'🎉' },
  'pareja': { icon:'🤝' }
};
const ACHIEVEMENTS_STORAGE_KEY = 'ligaGrumetil_seenAchievements_v1';

async function loadFromCloud() {
  try {
    const r = await fetch(JSONBIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY}});
    const d = await r.json();
    if(d.record){ state.players=d.record.players||DEFAULT_PLAYERS; state.matches=d.record.matches||[]; }
  } catch(e){ console.warn(e); }
}

async function saveToCloud() {
  try {
    await fetch(JSONBIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({players:state.players,matches:state.matches})});
  } catch(e){ console.warn(e); }
}

function normPair(a,b){ return [a,b].sort().join('|||'); }

function calcStats(){
  const ps={};
  state.players.forEach(p=>{ ps[p]={w:0,l:0,d:0,gw:0,gl:0,lastMatch:null,streak:[]}; });
  const pairs={};

  state.matches.forEach(m=>{
    const {t1p1,t1p2,t2p1,t2p2,s1,s2,date,score,location} = m;
    const teams=[[t1p1,t1p2],[t2p1,t2p2]];
    const res=[s1>s2?'w':s1<s2?'l':'d', s1>s2?'l':s1<s2?'w':'d'];

    let gamesT1=0, gamesT2=0;
    if(score){
      score.split('/').forEach(set=>{
        const parts=set.trim().split('-');
        if(parts.length===2){
          gamesT1+=parseInt(parts[0])||0;
          gamesT2+=parseInt(parts[1])||0;
        }
      });
    }

    teams.forEach((team,ti)=>{
      const r=res[ti];
      const g_win = ti===0 ? gamesT1 : gamesT2;
      const g_loss = ti===0 ? gamesT2 : gamesT1;

      team.forEach(p=>{
        if(!ps[p]) ps[p]={w:0,l:0,d:0,gw:0,gl:0,lastMatch:null,streak:[]};
        ps[p][r]++;
        ps[p].streak.push(r);
        ps[p].gw += g_win;
        ps[p].gl += g_loss;
        const opp=ti===0?[t2p1,t2p2]:[t1p1,t1p2];
        const partner=team.find(x=>x!==p);
        if(!ps[p].lastMatch||date>=ps[p].lastMatch.date){
          ps[p].lastMatch={date,partner,opp1:opp[0],opp2:opp[1],score:score||(s1+'-'+s2),res:r,location:location||''};
        }
      });
      const key=normPair(team[0],team[1]);
      if(!pairs[key]) pairs[key]={p1:team[0],p2:team[1],w:0,l:0,d:0,gw:0,gl:0};
      pairs[key][r]++;
      pairs[key].gw += g_win;
      pairs[key].gl += g_loss;
    });
  });
  return{ps,pairs};
}

function currentStreak(streak){
  if(!streak.length) return{type:'',len:0};
  const last=streak[streak.length-1];
  let len=0;
  for(let i=streak.length-1;i>=0;i--){ if(streak[i]===last) len++; else break; }
  return{type:last,len};
}

function winPct(w,total){ return total?Math.round(w/total*100):0; }

function parseScoreSets(score){
  if(!score) return [];
  return score.split('/').map(set=>{
    const parts=set.trim().split('-').map(v=>parseInt(v,10));
    if(parts.length!==2 || Number.isNaN(parts[0]) || Number.isNaN(parts[1])) return null;
    return {a:parts[0],b:parts[1]};
  }).filter(Boolean);
}

function getPlayerMatchHistory(player){
  return state.matches
    .filter(m=>[m.t1p1,m.t1p2,m.t2p1,m.t2p2].includes(player))
    .map(m=>{
      const inT1=[m.t1p1,m.t1p2].includes(player);
      const res=inT1?(m.s1>m.s2?'w':m.s1<m.s2?'l':'d'):(m.s2>m.s1?'w':m.s2<m.s1?'l':'d');
      const partner=inT1 ? [m.t1p1,m.t1p2].find(x=>x!==player) : [m.t2p1,m.t2p2].find(x=>x!==player);
      const opponents=inT1 ? [m.t2p1,m.t2p2] : [m.t1p1,m.t1p2];
      return {...m,res,partner,opponents};
    })
    .sort((a,b)=> b.date.localeCompare(a.date));
}

function getRecentForm(player,limit=5){
  const history=getPlayerMatchHistory(player).slice(0,limit).map(m=>m.res);
  while(history.length<limit) history.push('n');
  return history;
}


function getSeenAchievementsMap(){
  try { return JSON.parse(localStorage.getItem(ACHIEVEMENTS_STORAGE_KEY) || '{}'); }
  catch(e){ return {}; }
}

function saveSeenAchievementsMap(map){
  try { localStorage.setItem(ACHIEVEMENTS_STORAGE_KEY, JSON.stringify(map)); }
  catch(e){}
}

function getNewlyUnlockedAchievements(player){
  const achievements=getAchievements(player);
  const seenMap=getSeenAchievementsMap();
  if(!seenMap[player]){
    seenMap[player]=achievements.filter(a=>a.unlocked).map(a=>a.key);
    saveSeenAchievementsMap(seenMap);
    return [];
  }
  const seen=new Set(seenMap[player]||[]);
  return achievements.filter(a=>a.unlocked && !seen.has(a.key));
}

function markAchievementsSeen(player, achievements){
  const seenMap=getSeenAchievementsMap();
  const seen=new Set(seenMap[player]||[]);
  achievements.filter(a=>a.unlocked).forEach(a=>seen.add(a.key));
  seenMap[player]=Array.from(seen);
  saveSeenAchievementsMap(seenMap);
}

function getAchievements(player){
  const {ps,pairs}=calcStats();
  const s=ps[player]||{w:0,l:0,d:0,gw:0,gl:0};
  const history=getPlayerMatchHistory(player);
  const wonLocations=new Set();
  const beatenPlayers=new Set();
  let lostWithBagel=false;
  let wonWithBagel=false;
  let samePartnerWins=0;

  history.forEach(m=>{
    const sets=parseScoreSets(m.score);
    if(m.res==='w'){
      if(m.location) wonLocations.add(m.location);
      m.opponents.forEach(o=>beatenPlayers.add(o));
    }
    if(m.res==='w' && sets.some(set=> (m.t1p1===player || m.t1p2===player) ? (set.a===6 && set.b===0) : (set.b===6 && set.a===0))){
      wonWithBagel=true;
    }
    if(m.res==='l' && sets.some(set=> (m.t1p1===player || m.t1p2===player) ? (set.a===0 && set.b===6) : (set.b===0 && set.a===6))){
      lostWithBagel=true;
    }
  });

  Object.values(pairs).forEach(pair=>{
    if((pair.p1===player || pair.p2===player) && pair.w>=2) samePartnerWins=Math.max(samePartnerWins,pair.w);
  });

  const others=Math.max(state.players.length-1,0);
  const halfPlayers=Math.ceil(others/2);

  return [
    {key:'100', title:'El club de los 100', desc:'Ganas 100 puntos entre todos tus partidos.', unlocked:s.gw>=100},
    {key:'50', title:'El club de los 50', desc:'Ganas 50 puntos entre todos tus partidos.', unlocked:s.gw>=50},
    {key:'conquistador', title:'Conquistador', desc:'Has ganado en todos los campos de la liga.', unlocked:LOCATIONS.every(loc=>wonLocations.has(loc)) && LOCATIONS.length>0},
    {key:'vayadia', title:'Vaya Día!', desc:'Has perdido un partido con un set en blanco (0-6).', unlocked:lostWithBagel},
    {key:'apisonadora', title:'Apisonadora', desc:'Has ganado un partido con un set en blanco (6-0).', unlocked:wonWithBagel},
    {key:'destructor', title:'Destructor', desc:'Has ganado al 50% de los jugadores de la liga.', unlocked:others>0 && beatenPlayers.size>=halfPlayers},
    {key:'rey', title:'El Rey', desc:'Has ganado a todos los jugadores de la liga.', unlocked:others>0 && beatenPlayers.size>=others},
    {key:'bienvenido', title:'Bienvenido', desc:'Has ganado tu primer partido de la liga.', unlocked:s.w>=1},
    {key:'pareja', title:'Pareja de baile', desc:'Has ganado dos veces con la misma pareja.', unlocked:samePartnerWins>=2}
  ];
}

function rankPlayers(ps){
  return Object.entries(ps)
    .map(([name,s])=>({name,...s,total:s.w+s.l+s.d}))
    .sort((a,b)=>{
      if(b.w !== a.w) return b.w - a.w;
      const pa = a.total ? a.w/a.total : 0;
      const pb = b.total ? b.w/b.total : 0;
      if (a.w > 0) {
        if (a.total < b.total / 2) return 1;
        if (b.total < a.total / 2) return -1;
        if (Math.abs(pb - pa) > 0.0001) return pb - pa;
        if (b.total !== a.total) return b.total - a.total;
      } else {
        if (a.total !== b.total) return a.total - b.total;
      }
      const da = a.gw - a.gl;
      const db = b.gw - b.gl;
      if (db !== da) return db - da;
      return a.d - b.d;
    });
}

function rankPairs(pairs){
  return Object.values(pairs)
    .map(p=>({...p,total:p.w+p.l+p.d}))
    .sort((a,b)=>{
      if(b.w !== a.w) return b.w - a.w;
      const pa = a.total ? a.w/a.total : 0;
      const pb = b.total ? b.w/b.total : 0;
      if (a.w > 0) {
        if (a.total < b.total / 2) return 1;
        if (b.total < a.total / 2) return -1;
        if (Math.abs(pb - pa) > 0.0001) return pb - pa;
        if (b.total !== a.total) return b.total - a.total;
      } else {
        if (a.total !== b.total) return a.total - b.total;
      }
      const da = a.gw - a.gl;
      const db = b.gw - b.gl;
      if (db !== da) return db - da;
      return a.d - b.d;
    });
}

function calcMonthStats(){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  const cutStr=cutoff.toISOString().split('T')[0];
  const recent=state.matches.filter(m=>m.date>=cutStr);
  const ms={};
  state.players.forEach(p=>{ ms[p]={w:0,l:0,total:0}; });
  recent.forEach(m=>{
    const {t1p1,t1p2,t2p1,t2p2,s1,s2}=m;
    const teams=[[t1p1,t1p2],[t2p1,t2p2]];
    const res=[s1>s2?'w':s1<s2?'l':'d',s1>s2?'l':s1<s2?'w':'d'];
    teams.forEach((team,ti)=>{
      team.forEach(p=>{
        if(!ms[p]) ms[p]={w:0,l:0,total:0};
        ms[p][res[ti]]++;
        ms[p].total++;
      });
    });
  });
  const active=Object.entries(ms).filter(([,v])=>v.total>0);
  if(!active.length) return{mvp:null,worst:null};
  active.sort((a,b)=>b[1].w-a[1].w||b[1].total-a[1].total);
  const mvp={name:active[0][0],...active[0][1]};
  active.sort((a,b)=>a[1].w-b[1].w||b[1].total-a[1].total);
  const worst={name:active[0][0],...active[0][1]};
  return{mvp,worst};
}

function getAffinities(user){
  const {pairs}=calcStats();
  const myPairs = Object.values(pairs).filter(p => p.p1 === user || p.p2 === user);
  if(!myPairs.length) return {best:null, worst:null};
  const scores = myPairs.map(p => {
    const partner = p.p1 === user ? p.p2 : p.p1;
    return { name: partner, w: p.w, l: p.l, d: p.d, gw: p.gw, gl: p.gl, diff: p.gw - p.gl, total: p.w+p.l+p.d };
  });
  const best = [...scores].sort((a,b) => b.w - a.w || b.diff - a.diff)[0];
  const worst = [...scores].sort((a,b) => b.l - a.l || a.diff - b.diff)[0];
  return { best, worst };
}

    <div id="admin-alert" style="display:none"></div>
    <div class="card">
      <div class="form-row"><div class="form-group"><label>E1-A</label><select id="t1p1">${opts}</select></div><div class="form-group"><label>E1-B</label><select id="t1p2">${opts}</select></div></div>
      <div class="form-row"><div class="form-group"><label>E2-A</label><select id="t2p1">${opts}</select></div><div class="form-group"><label>E2-B</label><select id="t2p2">${opts}</select></div></div>
      <div class="form-row"><div class="form-group"><label>Sets E1</label><input type="number" id="s1" value="2"></div><div class="form-group"><label>Sets E2</label><input type="number" id="s2" value="1"></div></div>
      <div class="form-group"><label>Marcador (6-3 / 6-2)</label><input type="text" id="score-str"></div>
      <div class="form-row"><div class="form-group"><label>Lugar</label><select id="location">${locOpts}</select></div><div class="form-group"><label>Fecha</label><input type="date" id="mdate" value="${todayStr()}"></div></div>
      <button class="btn btn-yellow" onclick="addMatch()" style="width:100%">Guardar</button>
    </div>
    <div class="divider"></div>
    <div class="section-title">Jugadores</div>
    <div class="card">
      <div class="chips">${state.players.map(p=>`<span class="chip">${p}<span class="chip-x" onclick="removePlayer('${esc(p)}')">✕</span></span>`).join('')}</div>
      <div style="display:flex;gap:8px"><input type="text" id="new-player" style="flex:1" class="btn" style="text-align:left;color:white"><button class="btn btn-yellow" onclick="addPlayer()">Añadir</button></div>
    </div>`;
}

function showPerfilModal(playerName){
  const {ps}=calcStats();
  const s=ps[playerName]||{w:0,l:0,d:0,gw:0,gl:0};
  const myMatches=state.matches.filter(m=>[m.t1p1,m.t1p2,m.t2p1,m.t2p2].includes(playerName)).sort((a,b)=>b.date.localeCompare(a.date));
  const h2h={};
  myMatches.forEach(m=>{
    const inT1=[m.t1p1,m.t1p2].includes(playerName);
    const res=inT1?(m.s1>m.s2?'w':m.s1<m.s2?'l':'d'):(m.s2>m.s1?'w':m.s2<m.s1?'l':'d');
    const oppTeam=inT1?[m.t2p1,m.t2p2]:[m.t1p1,m.t1p2];
    oppTeam.forEach(opp=>{ if(!h2h[opp])h2h[opp]={w:0,l:0,d:0}; h2h[opp][res]++; });
  });
  const h2hRows=Object.entries(h2h).sort((a,b)=>(b[1].w+b[1].l+b[1].d)-(a[1].w+a[1].l+a[1].d)).map(([opp,r])=>`
    <div class="h2h-row"><div class="h2h-name">${opp}</div><div class="h2h-record"><span class="rec-w">${r.w}V</span> <span class="rec-e">${r.d}E</span> <span class="rec-l">${r.l}D</span></div></div>`).join('');
  document.getElementById('modal-perfil-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar avatar-md">${initials(playerName)}</div>
      <div><div class="modal-title" style="margin-bottom:2px">${playerName}</div><div style="font-size:12px;color:var(--text3)">${s.w}V - ${s.d}E - ${s.l}D</div></div>
    </div>
    <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Cara a cara</div>
    <div style="margin-bottom:16px">${h2hRows||'Sin datos'}</div>
    <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Partidos</div>
    <div>${myMatches.length?myMatches.map(m=>{
      const inT1=[m.t1p1,m.t1p2].includes(playerName);
      const res=inT1?(m.s1>m.s2?'w':m.s1<m.s2?'l':'d'):(m.s2>m.s1?'w':m.s2<m.s1?'l':'d');
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;justify-content:space-between"><span>${formatDate(m.date)}</span><span>${m.score||(m.s1+'-'+m.s2)} <span class="badge ${res==='w'?'badge-w':res==='l'?'badge-l':'badge-d'}">${res.toUpperCase()}</span></span></div>`
    }).join(''):'Sin partidos'}</div>`;
  document.getElementById('modal-perfil').classList.add('open');
}

async function addMatch(){
  const t1p1=document.getElementById('t1p1').value, t1p2=document.getElementById('t1p2').value;
  const t2p1=document.getElementById('t2p1').value, t2p2=document.getElementById('t2p2').value;
  const s1=parseInt(document.getElementById('s1').value), s2=parseInt(document.getElementById('s2').value);
  const date=document.getElementById('mdate').value, score=document.getElementById('score-str').value.trim();
  const location=document.getElementById('location').value;
  if(new Set([t1p1,t1p2,t2p1,t2p2]).size<4){showAdminAlert('Jugadores repetidos','err');return;}
  state.matches.push({t1p1,t1p2,t2p1,t2p2,s1,s2,date,score,location});
  showAdminAlert('Guardando...','info');
  await saveToCloud();
  showAdminAlert('¡Guardado!','ok');
  renderAdmin();
}

async function deleteMatch(idx){ if(confirm('¿Eliminar?')){ state.matches.splice(idx,1); await saveToCloud(); renderHistorial(); } }
async function addPlayer(){ const inp=document.getElementById('new-player'); if(!inp.value.trim())return; state.players.push(inp.value.trim()); await saveToCloud(); renderAdmin(); }
async function removePlayer(name){ if(confirm('¿Eliminar?')){ state.players=state.players.filter(p=>p!==name); await saveToCloud(); renderAdmin(); } }
function selectUser(name){ state.currentUser=name; renderHome(); }
function showLoginModal(){ document.getElementById('login-err').style.display='none'; document.getElementById('modal-login').classList.add('open'); }
function tryLogin(){ if(document.getElementById('pass-input').value===ADMIN_PASS){ state.isAdmin=true; document.getElementById('admin-label').style.display=''; document.getElementById('admin-tab').style.display=''; document.getElementById('login-btn').style.display='none'; document.getElementById('logout-btn').style.display=''; closeModal('modal-login'); } else { document.getElementById('login-err').style.display=''; } }
function doLogout(){ state.isAdmin=false; document.getElementById('admin-label').style.display='none'; document.getElementById('admin-tab').style.display='none'; document.getElementById('login-btn').style.display=''; document.getElementById('logout-btn').style.display='none'; showTab('home',document.querySelector('.tab')); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',function(e){ if(e.target===this) closeModal(this.id); }));
function initials(name){ return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function formatDate(str){
  if(!str) return '';
  const [y,m,d]=str.split('-');
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return parseInt(d)+' '+months[parseInt(m)-1]+' '+y;
}
function emptyState(msg){ return '<div class="empty">'+msg+'</div>'; }
function showAdminAlert(msg,type){ const el=document.getElementById('admin-alert'); el.className='alert alert-'+type; el.textContent=msg; el.style.display=''; }
function esc(s){ return s.replace(/'/g,"\\'").replace(/\"/g,'&quot;'); }
async function init(){ await loadFromCloud(); renderHome(); }
init();
</script>
</body>
</html>
